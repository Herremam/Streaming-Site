<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVault</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAV -->


  <!-- CONTINUE WATCHING -->
  <div class="cw-section" id="cw-section">
    <div class="section-header" style="padding: 0 2rem;">
      <h2 class="section-title">Continue Watching</h2>
    </div>
    <div id="cw-grid" class="grid" style="padding: 0 2rem 1rem;"></div>
  </div>

  <!-- GENRE FILTERS -->
  <div class="genre-row" id="genre-row">
    <button class="genre-btn active" data-id="">All</button>
    <button class="genre-btn" data-id="28">Action</button>
    <button class="genre-btn" data-id="35">Comedy</button>
    <button class="genre-btn" data-id="18">Drama</button>
    <button class="genre-btn" data-id="27">Horror</button>
    <button class="genre-btn" data-id="878">Sci-Fi</button>
    <button class="genre-btn" data-id="53">Thriller</button>
    <button class="genre-btn" data-id="16">Animation</button>
    <button class="genre-btn" data-id="10749">Romance</button>
    <button class="genre-btn" data-id="80">Crime</button>
  </div>

  <!-- MOVIE GRID -->
  <main class="main">
    <div class="section-header">
      <h2 class="section-title" id="section-title">Trending Movies</h2>
    </div>
    <div id="movies" class="grid"></div>
    <div class="load-more-wrap">
      <button id="load-more" class="btn-more">Load More</button>
    </div>
  </main>

  <footer class="footer">
    <p>StreamVault &mdash; Powered by Github</p>
    <p class="footer-disclaimer">⚠ Do not watch any content on this site. The content displayed here is likely illegally imported from secondary third-party sources. This site is not responsible for any content streamed through embedded players.</p>
  </footer>

  <script src="progress.js"></script>
  <script src="script.js"></script>
  <script src="banner.js"></script>
</body>
</html>

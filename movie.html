<!DOCTYPE html>
<html>
<head>
  <title>Watch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="details"></div>
  <div id="player"></div>

  <script>
    const API_KEY = "PASTE_YOUR_TMDB_KEY_HERE";

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    // Fetch movie details
    fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}`)
      .then(res => res.json())
      .then(movie => {
        document.getElementById("details").innerHTML = `
          <h1>${movie.title}</h1>
          <p>${movie.overview}</p>
        `;

        // 🔥 PLAYER (you can swap this later)
        document.getElementById("player").innerHTML = `
          <iframe
            src="https://www.youtube.com/embed/${movie.id}"
            width="100%"
            height="600"
            allowfullscreen>
          </iframe>
        `;
      });
  </script>

</body>
</html>

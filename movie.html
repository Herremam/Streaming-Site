fetch(`https://api.themoviedb.org/3/movie/${id}/external_ids?api_key=${API_KEY}`)
  .then(res => res.json())
  .then(ids => {
    const imdb = ids.imdb_id;

    document.getElementById("player").innerHTML = `
      <iframe
        src="https://your-embed-source.com/embed/${imdb}"
        width="100%"
        height="600"
        allowfullscreen>
      </iframe>
    `;
  });
